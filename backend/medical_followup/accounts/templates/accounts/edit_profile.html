<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑个人信息 - 医疗随访管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1a56db',
                        secondary: '#e2e8f0',
                        accent: '#3b82f6',
                        success: '#10b981',
                        warning: '#f59e0b',
                        danger: '#ef4444',
                        info: '#3b82f6',
                        light: '#f8fafc',
                        dark: '#1e293b'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .btn-primary {
                @apply bg-primary text-white px-4 py-2 rounded-lg hover:bg-primary/90 transition-all duration-300;
            }
            .btn-secondary {
                @apply bg-secondary text-dark px-4 py-2 rounded-lg hover:bg-secondary/80 transition-all duration-300;
            }
            .form-input {
                @apply w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-300;
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 顶部导航栏 -->
    <nav class="bg-white shadow-md">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fa fa-heartbeat text-primary text-2xl"></i>
                <h1 class="text-xl font-bold text-gray-800">医疗随访管理系统</h1>
            </div>
            <div class="hidden md:flex items-center space-x-6">
                <a href="{% url 'index' %}" class="text-gray-600 hover:text-primary transition-colors duration-200">首页</a>
                <a href="{% url 'patient_list' %}" class="text-gray-600 hover:text-primary transition-colors duration-200">患者管理</a>
                <a href="{% url 'profile' %}" class="text-primary font-medium border-b-2 border-primary pb-1">个人信息</a>
            </div>
            <div class="flex items-center space-x-4">
                <div class="relative">
                    <button class="flex items-center space-x-2">
                        <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center">
                            <span class="text-primary font-medium">{{ user.username|first|upper }}</span>
                        </div>
                        <span class="text-gray-700 hidden md:inline">{{ user.username }}</span>
                        <i class="fa fa-caret-down text-gray-500"></i>
                    </button>
                </div>
                <a href="{% url 'logout' %}" class="text-gray-600 hover:text-danger transition-colors duration-200">
                    <i class="fa fa-sign-out"></i>
                </a>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="container mx-auto px-4 py-8">
        <!-- 页面标题 -->
        <div class="flex justify-between items-center mb-6">
            <div>
                <h2 class="text-2xl font-bold text-gray-800">编辑个人信息</h2>
                <p class="text-gray-600 mt-1">修改您的个人信息</p>
            </div>
            <a href="{% url 'profile' %}" class="btn-secondary flex items-center">
                <i class="fa fa-arrow-left mr-2"></i> 返回
            </a>
        </div>

        <!-- 编辑表单 -->
        <div class="bg-white rounded-xl shadow p-6">
            <!-- 消息提示 -->
            {% if messages %}
            <div class="mb-6">
                {% for message in messages %}
                <div class="p-3 rounded-lg {% if message.tags == 'error' %}bg-red-100 text-red-800{% else %}bg-green-100 text-green-800{% endif %}">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}
            
            <form method="post" action="{% url 'edit_profile' %}">
                {% csrf_token %}
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="first_name" class="block text-sm font-medium text-gray-700 mb-1">姓名</label>
                        <div class="flex space-x-2">
                            <input type="text" id="first_name" name="first_name" value="{{ user.first_name }}" class="form-input" placeholder="名">
                            <input type="text" id="last_name" name="last_name" value="{{ user.last_name }}" class="form-input" placeholder="姓">
                        </div>
                    </div>
                    <div>
                        <label for="username" class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                        <input type="text" id="username" name="username" value="{{ user.username }}" class="form-input" disabled>
                    </div>
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">邮箱</label>
                        <input type="email" id="email" name="email" value="{{ user.email }}" class="form-input" required>
                    </div>
                    <div>
                        <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">电话号码</label>
                        <input type="tel" id="phone" name="phone" value="{{ user.phone }}" class="form-input" required>
                    </div>
                    <div>
                        <label for="gender" class="block text-sm font-medium text-gray-700 mb-1">性别</label>
                        <select id="gender" name="gender" class="form-input" required>
                            <option value="男" {% if user.gender == '男' %}selected{% endif %}>男</option>
                            <option value="女" {% if user.gender == '女' %}selected{% endif %}>女</option>
                        </select>
                    </div>
                    <div>
                        <label for="department" class="block text-sm font-medium text-gray-700 mb-1">科室</label>
                        <input type="text" id="department" name="department" value="{{ user.department }}" class="form-input" required>
                    </div>
                    <div>
                        <label for="title" class="block text-sm font-medium text-gray-700 mb-1">职称</label>
                        <input type="text" id="title" name="title" value="{{ user.title }}" class="form-input" required>
                    </div>
                    <div class="md:col-span-2">
                        <label for="bio" class="block text-sm font-medium text-gray-700 mb-1">个人简介</label>
                        <textarea id="bio" name="bio" rows="4" class="form-input" placeholder="请输入个人简介">{{ user.bio }}</textarea>
                    </div>
                </div>
                <div class="mt-6 flex justify-end space-x-3">
                    <a href="{% url 'profile' %}" class="btn-secondary">取消</a>
                    <button type="submit" class="btn-primary">保存更改</button>
                </div>
            </form>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="bg-white border-t border-gray-200 mt-8">
        <div class="container mx-auto px-4 py-6">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <div class="text-gray-600 text-sm mb-4 md:mb-0">
                    © 2026 医疗随访管理系统. 保留所有权利.
                </div>
                <div class="flex space-x-4">
                    <a href="#" class="text-gray-600 hover:text-primary transition-colors duration-200">
                        <i class="fa fa-question-circle"></i> 帮助
                    </a>
                    <a href="#" class="text-gray-600 hover:text-primary transition-colors duration-200">
                        <i class="fa fa-envelope"></i> 联系我们
                    </a>
                    <a href="#" class="text-gray-600 hover:text-primary transition-colors duration-200">
                        <i class="fa fa-info-circle"></i> 关于
                    </a>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>

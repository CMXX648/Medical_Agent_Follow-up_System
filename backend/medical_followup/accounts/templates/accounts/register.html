<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 医疗随访管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1a56db',
                        secondary: '#e2e8f0',
                        accent: '#3b82f6',
                        success: '#10b981',
                        warning: '#f59e0b',
                        danger: '#ef4444',
                        info: '#3b82f6',
                        light: '#f8fafc',
                        dark: '#1e293b'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .btn-primary {
                @apply bg-primary text-white px-6 py-3 rounded-lg hover:bg-primary/90 transition-all duration-300;
            }
            .btn-secondary {
                @apply bg-secondary text-dark px-6 py-3 rounded-lg hover:bg-secondary/80 transition-all duration-300;
            }
            .form-input {
                @apply w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-300;
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md p-8 bg-white rounded-xl shadow-lg">
        <div class="text-center mb-8">
            <div class="flex justify-center mb-4">
                <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center">
                    <i class="fa fa-user-plus text-primary text-2xl"></i>
                </div>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">医疗随访管理系统</h1>
            <p class="text-gray-600 mt-2">医生注册</p>
        </div>
        
        <!-- 消息提示 -->
        {% if messages %}
        <div class="mb-4">
            {% for message in messages %}
            <div class="p-3 rounded-lg {% if message.tags == 'error' %}bg-red-100 text-red-800{% else %}bg-green-100 text-green-800{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}
        
        <!-- 注册表单 -->
        <form method="post" action="{% url 'register' %}">
            {% csrf_token %}
            <div class="mb-4">
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                <input type="text" id="username" name="username" class="form-input" placeholder="请输入用户名" required>
            </div>
            <div class="mb-4">
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">邮箱</label>
                <input type="email" id="email" name="email" class="form-input" placeholder="请输入邮箱" required>
            </div>
            <div class="mb-4">
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="请输入密码" required>
            </div>
            <div class="mb-4">
                <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-1">确认密码</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-input" placeholder="请再次输入密码" required>
            </div>
            <div class="mb-4">
                <label for="gender" class="block text-sm font-medium text-gray-700 mb-1">性别</label>
                <select id="gender" name="gender" class="form-input" required>
                    <option value="">请选择</option>
                    <option value="男">男</option>
                    <option value="女">女</option>
                </select>
            </div>
            <div class="mb-4">
                <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">电话号码</label>
                <input type="tel" id="phone" name="phone" class="form-input" placeholder="请输入电话号码" required>
            </div>
            <div class="mb-4">
                <label for="department" class="block text-sm font-medium text-gray-700 mb-1">科室</label>
                <input type="text" id="department" name="department" class="form-input" placeholder="请输入科室" required>
            </div>
            <div class="mb-6">
                <label for="title" class="block text-sm font-medium text-gray-700 mb-1">职称</label>
                <input type="text" id="title" name="title" class="form-input" placeholder="请输入职称" required>
            </div>
            <button type="submit" class="btn-primary w-full flex items-center justify-center">
                <i class="fa fa-user-plus mr-2"></i> 注册
            </button>
        </form>
        
        <div class="mt-6 text-center">
            <p class="text-gray-600">已有账号？ <a href="{% url 'login' %}" class="text-primary hover:underline">立即登录</a></p>
        </div>
    </div>
</body>
</html>
